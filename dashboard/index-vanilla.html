<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raspberry Pi Dashboard - Vanilla JS</title>
    <link rel="stylesheet" href="dashboard-built.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .header {
            color: white;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 1.1em;
        }
        
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        .status-indicator.connected {
            background-color: #4ade80;
        }
        
        .status-indicator.disconnected {
            background-color: #ef4444;
            animation: none;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
        }
        
        .pin-card {
            text-align: center;
        }
        
        .pin-label {
            font-size: 0.9em;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        
        .pin-state {
            font-size: 3em;
            font-weight: bold;
            margin: 15px 0;
        }
        
        .pin-state.high {
            color: #4ade80;
        }
        
        .pin-state.low {
            color: #ef4444;
        }
        
        .pin-indicator {
            display: inline-block;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin: 10px 0;
        }
        
        .pin-indicator.high {
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.6);
        }
        
        .pin-indicator.low {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.3);
        }
        
        .serial-card {
            grid-column: 1 / -1;
        }
        
        .serial-title {
            font-size: 1.1em;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
        }
        
        .serial-data {
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            max-height: 200px;
            overflow-y: auto;
            color: #222;
            line-height: 1.5;
            font-size: 0.9em;
            white-space: pre-wrap;
            word-break: break-all;
            min-height: 60px;
        }
        
        .timestamp {
            font-size: 0.8em;
            color: #999;
            margin-top: 10px;
        }
        
        .error {
            background-color: #fee2e2;
            border-left: 4px solid #ef4444;
            color: #991b1b;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .config-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            display: none;
        }
        
        .config-overlay.show {
            display: flex;
        }
        
        .config-modal {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .config-modal h2 {
            margin-bottom: 20px;
            color: #333;
        }
        
        .config-group {
            margin-bottom: 20px;
        }
        
        .config-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        .config-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 1em;
            font-family: 'Courier New', monospace;
            box-sizing: border-box;
        }
        
        .config-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .config-help {
            font-size: 0.85em;
            color: #666;
            margin-top: 5px;
            white-space: pre-line;
        }
        
        .config-buttons {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }
        
        .config-buttons button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .config-buttons .btn-connect {
            background: #667eea;
            color: white;
        }
        
        .config-buttons .btn-connect:hover {
            background: #5568d3;
        }
        
        .config-buttons .btn-reset {
            background: #f3f4f6;
            color: #333;
        }
        
        .config-buttons .btn-reset:hover {
            background: #e5e7eb;
        }
        
        .server-url-display {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 0.8em;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.3s;
        }
        
        .server-url-display:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎛️ Raspberry Pi Dashboard</h1>
            <div class="status">
                <div id="statusIndicator" class="status-indicator disconnected"></div>
                <span id="statusText">Disconnected</span>
            </div>
        </div>
        
        <div id="error" class="error" style="display: none;"></div>
        
        <div class="grid" id="grid">
            <!-- Pins will be inserted here -->
        </div>
        
        <div id="configOverlay" class="config-overlay">
            <div class="config-modal">
                <h2>Server Configuration</h2>
                
                <div class="config-group">
                    <label for="server-url">WebSocket Server URL</label>
                    <input
                        id="server-url"
                        type="text"
                        placeholder="ws://192.168.1.100:8765"
                    />
                    <div class="config-help">Format: ws://HOST:PORT or wss://HOST:PORT (SSL)</div>
                </div>
                
                <div class="config-group">
                    <label>Current Connection</label>
                    <div class="config-help">
                        <span id="statusInfo"></span>
                    </div>
                </div>
                
                <div class="config-buttons">
                    <button class="btn-connect" id="btnConnect">Connect (Session)</button>
                    <button class="btn-connect" id="btnSave" style="background-color: #16a34a;">Save & Connect</button>
                    <button class="btn-reset" id="btnReset">Reset</button>
                </div>
            </div>
        </div>
        
        <div id="serverUrlDisplay" class="server-url-display"></div>
    </div>
    
    <script>
        class Dashboard {
            constructor() {
                this.ws = null;
                this.pins = {};
                this.serialData = "";
                this.timestamp = "";
                
                this.elements = {
                    statusIndicator: document.getElementById('statusIndicator'),
                    statusText: document.getElementById('statusText'),
                    error: document.getElementById('error'),
                    grid: document.getElementById('grid'),
                    configOverlay: document.getElementById('configOverlay'),
                    serverUrlDisplay: document.getElementById('serverUrlDisplay'),
                    serverUrlInput: document.getElementById('server-url'),
                    statusInfo: document.getElementById('statusInfo'),
                    btnConnect: document.getElementById('btnConnect'),
                    btnSave: document.getElementById('btnSave'),
                    btnReset: document.getElementById('btnReset')
                };
                
                this.setupEventListeners();
                this.serverUrl = this.getServerUrl();
                this.connect();
            }
            
            getServerUrl() {
                const stored = sessionStorage.getItem('ws_server_url');
                if (stored) return stored;
                const persistent = localStorage.getItem('ws_server_url_persistent');
                if (persistent) return persistent;
                const params = new URLSearchParams(window.location.search);
                const paramUrl = params.get('server');
                if (paramUrl) return paramUrl;
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                return `${protocol}//${window.location.hostname}:8765`;
            }
            
            setupEventListeners() {
                this.elements.serverUrlDisplay.addEventListener('click', () => {
                    this.showConfig();
                });
                
                this.elements.configOverlay.addEventListener('click', (e) => {
                    if (e.target === e.currentTarget) {
                        this.hideConfig();
                    }
                });
                
                this.elements.btnConnect.addEventListener('click', () => {
                    const url = this.elements.serverUrlInput.value.trim();
                    if (url) {
                        sessionStorage.setItem('ws_server_url', url);
                        this.serverUrl = url;
                        this.hideConfig();
                        this.connect();
                    }
                });
                
                this.elements.btnSave.addEventListener('click', () => {
                    const url = this.elements.serverUrlInput.value.trim();
                    if (url) {
                        localStorage.setItem('ws_server_url_persistent', url);
                        sessionStorage.setItem('ws_server_url', url);
                        this.serverUrl = url;
                        this.hideConfig();
                        this.connect();
                    }
                });
                
                this.elements.btnReset.addEventListener('click', () => {
                    sessionStorage.removeItem('ws_server_url');
                    localStorage.removeItem('ws_server_url_persistent');
                    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                    const defaultUrl = `${protocol}//${window.location.hostname}:8765`;
                    this.serverUrl = defaultUrl;
                    this.hideConfig();
                    this.connect();
                });
            }
            
            showConfig() {
                this.elements.serverUrlInput.value = this.serverUrl;
                this.updateStatusInfo();
                this.elements.configOverlay.classList.add('show');
            }
            
            hideConfig() {
                this.elements.configOverlay.classList.remove('show');
            }
            
            updateStatusInfo() {
                const status = this.ws?.readyState === WebSocket.OPEN ? '✅ Connected' : '❌ Disconnected';
                this.elements.statusInfo.textContent = `Status: ${status}\nURL: ${this.serverUrl}`;
            }
            
            connect() {
                if (this.ws) {
                    this.ws.close();
                }
                
                try {
                    this.ws = new WebSocket(this.serverUrl);
                    
                    this.ws.onopen = () => this.onConnected();
                    this.ws.onmessage = (e) => this.onMessage(e);
                    this.ws.onerror = () => this.onError();
                    this.ws.onclose = () => this.onDisconnected();
                } catch (e) {
                    this.showError(`Failed to connect: ${e.message}`);
                    setTimeout(() => this.connect(), 3000);
                }
            }
            
            onConnected() {
                console.log("Connected to WebSocket server");
                this.setStatus(true);
                this.clearError();
            }
            
            onMessage(event) {
                try {
                    const data = JSON.parse(event.data);
                    
                    if (data.gpio) {
                        this.pins = data.gpio;
                        this.render();
                    }
                    
                    if (data.serial) {
                        this.serialData = data.serial;
                    }
                    
                    if (data.timestamp) {
                        this.timestamp = new Date(data.timestamp).toLocaleTimeString();
                    }
                } catch (e) {
                    console.error("Error parsing message:", e);
                }
            }
            
            onError() {
                this.showError("Connection error - check server address");
            }
            
            onDisconnected() {
                console.log("Disconnected from WebSocket server");
                this.setStatus(false);
                setTimeout(() => this.connect(), 3000);
            }
            
            setStatus(connected) {
                if (connected) {
                    this.elements.statusIndicator.className = 'status-indicator connected';
                    this.elements.statusText.textContent = 'Connected';
                } else {
                    this.elements.statusIndicator.className = 'status-indicator disconnected';
                    this.elements.statusText.textContent = 'Disconnected';
                }
                this.elements.serverUrlDisplay.textContent = `🔧 ${this.serverUrl}`;
            }
            
            showError(message) {
                this.elements.error.textContent = message;
                this.elements.error.style.display = 'block';
            }
            
            clearError() {
                this.elements.error.style.display = 'none';
            }
            
            render() {
                let html = '';
                
                Object.entries(this.pins).forEach(([pin, state]) => {
                    const stateClass = state ? 'high' : 'low';
                    const stateText = state ? 'HIGH' : 'LOW';
                    
                    html += `
                        <div class="card pin-card">
                            <div class="pin-label">GPIO ${pin}</div>
                            <div class="pin-indicator ${stateClass}"></div>
                            <div class="pin-state ${stateClass}">${stateText}</div>
                            <div class="timestamp">${this.timestamp}</div>
                        </div>
                    `;
                });
                
                html += `
                    <div class="card serial-card">
                        <div class="serial-title">📡 Serial Data</div>
                        <div class="serial-data">${this.serialData || 'No data...'}</div>
                        <div class="timestamp">${this.timestamp}</div>
                    </div>
                `;
                
                this.elements.grid.innerHTML = html;
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            new Dashboard();
        });
    </script>
</body>
</html>
