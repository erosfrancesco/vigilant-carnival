<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raspberry Pi Dashboard - Preact</title>
    <script src="https://cdn.jsdelivr.net/npm/preact@10/dist/preact.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/preact@10/hooks/dist/hooks.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@7"></script>
    <link rel="stylesheet" href="dashboard-built.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script src="utils.js"></script>
    <script type="text/babel">
        const { h, render } = preact;
        const { useState, useEffect, useRef } = preact.hooks;
        
        // Get server URL from storage or defaults
        const getServerUrl = window.getServerUrl;
        const getGPIOLabel = window.getGPIOLabel;
        
        function Dashboard() {
            // Use WebSocket connection hook
            const {
                connected,
                serverUrl,
                tempUrl,
                showConfig,
                error,
                ws,
                handleConnect,
                handlePersistent,
                handleReset,
                setTempUrl,
                setShowConfig,
            } = useWebSocketConnection();

            // const [connected, setConnected] = useState(false);
            const [pins, setPins] = useState({});
            const [serialData, setSerialData] = useState("");
            const [timestamp, setTimestamp] = useState("");
            // const [error, setError] = useState("");
            // const [serverUrl, setServerUrl] = useState(getServerUrl());
            // const [tempUrl, setTempUrl] = useState(serverUrl);
            // const [showConfig, setShowConfig] = useState(false);
            // const ws = useRef(null);
            
            /*
            useEffect(() => {
                connectWebSocket();
                return () => {
                    if (ws.current) ws.current.close();
                };
            }, [serverUrl]);
            /**/
            
            /*
            function connectWebSocket() {
                try {
                    ws.current = new WebSocket(serverUrl);
                    ws.current.onopen = () => {
                        setConnected(true);
                        setError("");
                    };
                    ws.current.onmessage = (event) => {
                        try {
                            const data = JSON.parse(event.data);
                            if (data.gpio) setPins(data.gpio);
                            if (data.serial) setSerialData(data.serial);
                            if (data.timestamp) setTimestamp(new Date(data.timestamp).toLocaleTimeString());
                        } catch (e) {
                            console.error("Error parsing:", e);
                        }
                    };
                    ws.current.onerror = () => setError("Connection error");
                    ws.current.onclose = () => {
                        setConnected(false);
                        setTimeout(connectWebSocket, 3000);
                    };
                } catch (e) {
                    setError(`Failed: ${e.message}`);
                    setTimeout(connectWebSocket, 3000);
                }
            }
            /**/
            
            /*
            function handleConnect() {
                if (tempUrl.trim()) {
                    sessionStorage.setItem('ws_server_url', tempUrl.trim());
                    setServerUrl(tempUrl.trim());
                    setShowConfig(false);
                }
            }
            
            function handlePersistent() {
                if (tempUrl.trim()) {
                    localStorage.setItem('ws_server_url_persistent', tempUrl.trim());
                    sessionStorage.setItem('ws_server_url', tempUrl.trim());
                    setServerUrl(tempUrl.trim());
                    setShowConfig(false);
                }
            }
            
            function handleReset() {
                sessionStorage.removeItem('ws_server_url');
                localStorage.removeItem('ws_server_url_persistent');
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const defaultUrl = `${protocol}//${window.location.hostname}:8765`;
                setTempUrl(defaultUrl);
                setServerUrl(defaultUrl);
                setShowConfig(false);
            }
            /**/
            
            return h("div", null,
                h("div", { className: "max-w-4xl mx-auto" },
                    h("div", { className: "text-white mb-8 text-center" },
                        h("h1", { className: "text-5xl mb-3" }, "🎛️ Raspberry Pi Dashboard"),
                        h("div", { className: "flex items-center justify-center gap-3 text-lg" },
                            h("div", { className: `w-3 h-3 rounded-full ${connected ? 'bg-green-400 animate-pulse' : 'bg-red-500'}` }),
                            h("span", null, connected ? 'Connected' : 'Disconnected')
                        )
                    ),
                    error && h("div", { className: "bg-red-100 border-l-4 border-red-500 text-red-700 p-4 rounded-lg mb-5" }, error),
                    h("div", { className: "grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5" },
                        Object.entries(pins).map(([pin, state]) =>
                            h("div", { key: pin, className: "bg-white rounded-xl p-5 shadow-lg hover:shadow-xl transition-shadow duration-300 text-center" },
                                h("div", { className: "text-sm text-gray-600 uppercase tracking-wide mb-3" }, getGPIOLabel(pin)),
                                h("div", { className: `w-15 h-15 rounded-full mx-auto my-3 shadow-md ${state ? 'bg-gradient-to-br from-green-400 to-green-600' : 'bg-gradient-to-br from-red-400 to-red-600'}` }),
                                h("div", { className: `text-3xl font-bold my-4 min-h-15 flex items-center justify-center ${state ? 'text-green-500' : 'text-red-500'}` }, state ? 'HIGH' : 'LOW'),
                                h("div", { className: "text-sm text-gray-500 mt-3" }, timestamp)
                            )
                        ),
                        h("div", { className: "bg-white rounded-xl p-5 shadow-lg hover:shadow-xl transition-shadow duration-300 col-span-full" },
                            h("div", { className: "text-lg font-semibold text-gray-800 mb-4" }, "📡 Serial Data"),
                            h("div", { className: "bg-gray-100 border border-gray-300 rounded-lg p-4 font-mono max-h-48 overflow-y-auto text-gray-800 text-sm leading-relaxed break-all whitespace-pre-wrap" }, serialData || "No data..."),
                            h("div", { className: "text-sm text-gray-500 mt-3" }, timestamp)
                        )
                    )
                ),
                h("div", { className: "fixed bottom-5 right-5 bg-black bg-opacity-70 text-white px-4 py-2 rounded-lg text-sm font-mono cursor-pointer opacity-60 hover:opacity-100 transition-opacity", onClick: () => setShowConfig(true) }, `🔧 ${serverUrl}`),
                showConfig && h("div", { className: "fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50", onClick: (e) => e.target === e.currentTarget && setShowConfig(false) },
                    h("div", { className: "bg-white rounded-xl p-8 max-w-md w-full mx-4 shadow-2xl" },
                        h("h2", { className: "text-2xl font-bold text-gray-800 mb-6" }, "Server Configuration"),
                        h("div", { className: "mb-6" },
                            h("label", { htmlFor: "server-url", className: "block text-sm font-medium text-gray-700 mb-2" }, "WebSocket Server URL"),
                            h("input", {
                                id: "server-url",
                                type: "text",
                                value: tempUrl,
                                onInput: (e) => setTempUrl(e.target.value),
                                placeholder: "ws://192.168.1.100:8765"
                            }),
                            h("div", { className: "text-sm text-gray-600 mt-1" }, "Format: ws://HOST:PORT or wss://HOST:PORT")
                        ),
                        h("div", { className: "mb-6" },
                            h("label", { className: "block text-sm font-medium text-gray-700 mb-2" }, "Current Connection"),
                            h("div", { className: "text-sm text-gray-600 mt-1" }, `Status: ${connected ? '✅ Connected' : '❌ Disconnected'}\nURL: ${serverUrl}`)
                        ),
                        h("div", { className: "flex gap-3 mt-8" },
                            h("button", { className: "flex-1 py-2 px-4 bg-blue-500 text-white rounded-lg font-semibold hover:bg-blue-600 transition-colors", onClick: handleConnect }, "Connect (Session)"),
                            h("button", { className: "flex-1 py-2 px-4 bg-green-500 text-white rounded-lg font-semibold hover:bg-green-600 transition-colors", onClick: handlePersistent }, "Save & Connect"),
                            h("button", { className: "flex-1 py-2 px-4 bg-gray-200 text-gray-800 rounded-lg font-semibold hover:bg-gray-300 transition-colors", onClick: handleReset }, "Reset")
                        )
                    )
                )
            );
        }
        
        render(h(Dashboard), document.getElementById('root'));
    </script>
</body>
</html>
